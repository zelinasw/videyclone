<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Videy</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" integrity="sha512-iBBXm8fW90+nuLcSKlbmrPcLa0OT92xO1BIsZ+ywDWZCvqsWgccV3gFoRBv0z+8dLJgyAHIhR35VZc2oM/gI1w==" crossorigin="anonymous" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Source+Sans+Pro:wght@200;300;400;600&family=Poppins:wght@600&display=swap" rel="stylesheet">
    <!-- Menghubungkan langsung ke file gaya visual asli Videy kamu -->
    <link rel="stylesheet" type="text/css" href="/style.css">
    
    <style>
        /* Penyesuaian khusus agar list menyatu dengan style bawaan Videy */
        body { background-color: #fff; color: #000; font-family: 'Source Sans Pro', sans-serif; }
        .list-wrapper { max-width: 600px; margin: 40px auto; padding: 0 20px; box-sizing: border-box; }
        .search-container { margin-bottom: 25px; }
        .search-container input[type="text"] { width: 100%; padding: 12px 15px; border: 1px solid #ccc; background: #fff; color: #000; border-radius: 4px; box-sizing: border-box; font-size: 15px; font-family: inherit; outline: none; }
        .search-container input[type="text"]:focus { border-color: #999; }
        
        .video-rows { display: flex; flex-direction: column; gap: 15px; }
        .video-row-item { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; padding-bottom: 12px; gap: 15px; }
        
        /* Link pendek berwarna biru khas teks internet */
        .video-short-url { color: #0088cc; text-decoration: none; font-size: 15px; word-break: break-all; font-weight: 400; }
        .video-short-url:hover { text-decoration: underline; }
        
        /* Tombol tonton bergaya minimalis Videy */
        .btn-watch-item { background: #e2e2e2; color: #555; text-decoration: none; padding: 8px 16px; border-radius: 4px; font-weight: 600; font-size: 13px; text-transform: uppercase; white-space: nowrap; transition: 0.2s; border: 1px solid #dcdcdc; }
        .btn-watch-item:hover { background: #ff3333; color: #fff; border-color: #ff3333; }
    </style>
</head>
<body>

    <!-- Navbar Ori Videy -->
    <div class="nav-outer">
        <div class="nav-inner">
            <div class="logo-text"><a href="/">videy</a></div>
            <a href="/"><div class="upload-button-nav">Upload</div></a>
            <div class="legal">
                <div class="legal-menu"><a href="javascript:void(0);" class="icon" onclick="toggleMobileNavbar()"><i class="fa fa-bars"></i></a></div>
                <div class="legal-item"><a href="/">Privacy Policy</a></div>
                <div class="legal-item"><a href="/">Terms of Service</a></div>
                <div class="legal-item"><a>Abuse</a></div>
            </div>
        </div>
    </div>
    <div id="mobile-menu">
        <a href="/">Privacy Policy</a>
        <a href="/">Terms of Service</a>
        <a>Abuse</a>
    </div>

    <!-- Area Konten Utama Terkloning Sempurna -->
    <div class="list-wrapper">
        <div class="search-container">
            <input type="text" id="search-input" placeholder="Cari link video..." oninput="filterVideosList()">
        </div>

        <div class="video-rows" id="list-container">
            <div style="text-align: center; color: #999; padding: 20px;">Memuat list video...</div>
        </div>
    </div>

    <script>
        let rawVideoData = [];

        function toggleMobileNavbar() {
            var x = document.getElementById("mobile-menu");
            x.style.display = (x.style.display === "flex") ? "none" : "flex";
        }

        async function fetchAllVideosForList() {
            const container = document.getElementById('list-container');
            try {
                const res = await fetch('/api/get-videos');
                const json = await res.json();
                
                if(json.success && json.data) {
                    rawVideoData = json.data;
                    renderVideosList(rawVideoData);
                } else {
                    container.innerHTML = '<div style="text-align: center; color: #ff3333; padding: 20px;">Gagal memuat list data.</div>';
                }
            } catch (err) {
                container.innerHTML = '<div style="text-align: center; color: #ff3333; padding: 20px;">Terjadi kesalahan jaringan.</div>';
            }
        }

        function renderVideosList(videos) {
            const container = document.getElementById('list-container');
            container.innerHTML = '';
            
            if(videos.length === 0) {
                container.innerHTML = '<div style="text-align: center; color: #999; padding: 20px;">Link tidak ditemukan.</div>';
                return;
            }

            const originDomain = window.location.origin;

            videos.forEach(video => {
                const shortLink = `${originDomain}/v/${video.videy_id}`;
                
                // Merender murni hanya komponen URL dan tombol aksi tanpa memunculkan judul database
                container.innerHTML += `
                    <div class="video-row-item">
                        <a href="/video.html?id=${video.videy_id}" target="_blank" class="video-short-url">${shortLink}</a>
                        <a href="/video.html?id=${video.videy_id}" target="_blank" class="btn-watch-item">▶ Tonton</a>
                    </div>
                `;
            });
        }

        function filterVideosList() {
            const query = document.getElementById('search-input').value.toLowerCase();
            // Walau judul disembunyikan di layar, kamu tetap bisa mencarinya lewat kotak input pencarian gess
            const filtered = rawVideoData.filter(v => (v.title || '').toLowerCase().includes(query));
            renderVideosList(filtered);
        }

        window.onload = fetchAllVideosForList;
    </script>
</body>
</html>
