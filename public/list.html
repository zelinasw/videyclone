<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Semua Koleksi Video</title>
    <style>
        body { background-color: #0b0b0b; color: #fff; font-family: sans-serif; padding: 20px; margin: 0; }
        .container { max-width: 1000px; margin: 20px auto; background: #111; padding: 20px; border-radius: 8px; border: 1px solid #222; }
        h1 { color: red; text-align: center; font-size: 24px; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 1px; }
        .search-box { margin-bottom: 20px; }
        input[type="text"] { width: 100%; padding: 12px; background: #000; border: 1px solid #333; color: #fff; border-radius: 4px; box-sizing: border-box; font-size: 15px; }
        .video-grid { display: flex; flex-direction: column; gap: 12px; max-height: 600px; overflow-y: auto; padding-right: 5px; }
        .video-card { display: flex; justify-content: space-between; align-items: center; background: #070707; padding: 15px; border-radius: 6px; border: 1px solid #1c1c1c; gap: 15px; }
        .video-card:hover { background: #141414; border-color: #333; }
        .video-details { display: flex; flex-direction: column; gap: 5px; overflow: hidden; }
        .video-title { font-weight: bold; color: #ccc; font-size: 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .video-url { font-size: 13px; color: #0088cc; text-decoration: none; word-break: break-all; }
        .video-url:hover { text-decoration: underline; }
        .btn-watch { background: red; color: #fff; text-decoration: none; padding: 10px 20px; border-radius: 4px; font-weight: bold; font-size: 14px; text-transform: uppercase; white-space: nowrap; transition: background 0.2s; }
        .btn-watch:hover { background: #cc0000; }
        /* Custom Scrollbar */
        .video-grid::-webkit-scrollbar { width: 6px; }
        .video-grid::-webkit-scrollbar-track { background: #000; }
        .video-grid::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Koleksi Semua Video</h1>
    
    <div class="search-box">
        <input type="text" id="search-input" placeholder="Cari judul video di sini..." oninput="filterList()">
    </div>

    <div class="video-grid" id="list-container">
        <div style="text-align: center; color: #666; padding: 20px;">Memuat data video...</div>
    </div>
</div>

<script>
    let allData = [];

    async function loadAllVideos() {
        const container = document.getElementById('list-container');
        try {
            // Mengambil data dari API yang sudah ter-cache otomatis di Cloudflare gess
            const res = await fetch('/api/get-videos');
            const json = await res.json();
            
            if(json.success && json.data) {
                allData = json.data;
                renderList(allData);
            } else {
                container.innerHTML = '<div style="text-align: center; color: red; padding: 20px;">Gagal memuat data video.</div>';
            }
        } catch (err) {
            container.innerHTML = '<div style="text-align: center; color: red; padding: 20px;">Terjadi kesalahan koneksi.</div>';
        }
    }

    function renderList(videos) {
        const container = document.getElementById('list-container');
        container.innerHTML = '';
        
        if(videos.length === 0) {
            container.innerHTML = '<div style="text-align: center; color: #666; padding: 20px;">Video tidak ditemukan.</div>';
            return;
        }

        const currentDomain = window.location.origin;

        videos.forEach(video => {
            // Mengubah format mentah dari database menjadi link pendek maskot domainmu gess
            const shortLink = `${currentDomain}/v/${video.videy_id}`;
            
            container.innerHTML += `
                <div class="video-card">
                    <div class="video-details">
                        <span class="video-title">${video.title || 'Tanpa Judul'}</span>
                        <a href="${shortLink}" target="_blank" class="video-url">${shortLink}</a>
                    </div>
                    <a href="${shortLink}" target="_blank" class="btn-watch">▶ Tonton Video</a>
                </div>
            `;
        });
    }

    function filterList() {
        const query = document.getElementById('search-input').value.toLowerCase();
        const filtered = allData.filter(v => (v.title || '').toLowerCase().includes(query));
        renderList(filtered);
    }

    window.onload = loadAllVideos;
</script>
</body>
</html>
